<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nafiz Fuad</title>

    <!-- SEO -->
    <meta name="description" content="Nafiz Fuad is a professional architect in Bangladesh specializing in residential, commercial and interior design. View portfolio and projects.">
    <meta name="keywords" content="Architect Bangladesh, Interior Designer Dhaka, Nafiz Fuad Architect">
    <meta name="author" content="Nafiz Fuad" />

    <!-- FIXED Canonical -->
    <link rel="canonical" href="https://nafizfuad.qzz.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nafiz Fuad">
    <meta property="og:description" content="Professional architect in Bangladesh.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nafizfuad.qzz.io/">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nafiz Fuad">
    <meta name="twitter:description" content="Professional architect in Bangladesh.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <link rel="icon" href="/favicon.ico" />

    <!-- Clean minimal design -->
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #ffffff;
        color: #111;
      }

      .seo-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        padding: 20px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 10px;
        font-weight: 600;
      }

      p {
        font-size: 14px;
        color: #555;
        max-width: 500px;
      }

      nav {
        margin-top: 20px;
      }

      nav a {
        margin: 0 10px;
        text-decoration: none;
        color: #333;
        font-size: 13px;
      }
    </style>

    <!-- Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Nafiz Fuad",
      "jobTitle": "Architect",
      "url": "https://nafizfuad.qzz.io",
      "sameAs": [
        "https://linkedin.com/in/your-actual-profile",
        "https://instagram.com/your-actual-profile"
      ]
    }
    </script>

  </head>

  <body>

    <!-- ✅ SEO + CLEAN LOADING UI -->
    <div class="seo-container" id="seo-content">
      <h1>Nafiz Fuad – Architect & Interior Designer in Bangladesh</h1>
      <p>
        Professional architectural services specializing in residential, commercial,
        and interior design. Explore projects and modern design solutions.
      </p>

      <nav>
        <a href="#projects">Projects</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>

    <!-- React App -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Remove static content after React loads -->
    <script>
      window.addEventListener("load", () => {
        const seo = document.getElementById("seo-content");
        if (seo) seo.style.display = "none";
      });
    </script>

  </body>
</html>
