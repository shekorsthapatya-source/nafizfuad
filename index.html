<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (kept simple but improved SEO slightly) -->
    <title>Nafiz Fuad</title>

    <!-- SEO Meta -->
    <meta name="description" content="Nafiz Fuad is a professional architect in Bangladesh specializing in residential, commercial and interior design. View portfolio and projects.">
    <meta name="keywords" content="Architect Bangladesh, Interior Designer Dhaka, Nafiz Fuad Architect">
    <meta name="author" content="Nafiz Fuad" />

    <!-- Canonical -->
    <link rel="canonical" href="https://nafizfuad.qzz.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nafiz Fuad">
    <meta property="og:description" content="Professional architect in Bangladesh. View projects and portfolio.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nafizfuad.qzz.io/">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nafiz Fuad">
    <meta name="twitter:description" content="Professional architect in Bangladesh.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- ✅ Clean Loader Style -->
    <style>
      #loader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        font-size: 14px;
        color: #666;
        z-index: 9999;
      }
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Nafiz Fuad",
      "jobTitle": "Architect",
      "url": "https://nafizfuad.qzz.io",
      "sameAs": [
        "https://linkedin.com/in/your-actual-profile",
        "https://instagram.com/your-actual-profile"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dhaka",
        "addressCountry": "BD"
      }
    }
    </script>

  </head>

  <body>

    <!-- ✅ Clean minimal loader (no ugly SEO text) -->
    <div id="loader">Loading...</div>

    <!-- ✅ Root with REAL (visible, simple) SEO content -->
    <div id="root">
      <h1 style="font-size:16px; font-weight:500; text-align:center; margin-top:20px;">
        Nafiz Fuad - Architect in Bangladesh
      </h1>
    </div>

    <!-- React -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Remove loader after React loads -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>

  </body>
</html>
