<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title fixed -->
    <title>Nafiz Fuad</title>
    
    <meta name="description" content="MD. Nafiz Fuad is a professional architect in Bangladesh specializing in modern, minimal residential and commercial interior design.">
    <meta name="author" content="Nafiz Fuad" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nafiz Fuad" />
    <meta property="og:description" content="Professional architectural design and interior solutions in Bangladesh by Nafiz Fuad." />
    <meta property="og:url" content="https://nafizfuad.qzz.io/" />
    <meta property="og:image" content="YOUR_IMAGE_URL_HERE" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="canonical" href="https://nafizfuad.qzz.io/" />
  </head>

  <body>
    <!-- ❌ Removed text from loading/root -->
    <div id="root"></div>

    <!-- Optional: clean loader (no text, just spinner) -->
    <style>
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid black;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }
    </style>

    <!-- Loader without text -->
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <script>
      // remove loader after site loads
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
