<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nafiz Fuad</title>

    <!-- SEO -->
    <meta name="description" content="Nafiz Fuad is a professional architect in Bangladesh specializing in residential, commercial and interior design.">
    <meta name="keywords" content="Architect Bangladesh, Interior Designer Dhaka, Nafiz Fuad Architect">
    <meta name="author" content="Nafiz Fuad" />

    <!-- Canonical -->
    <link rel="canonical" href="https://nafizfuad.qzz.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nafiz Fuad">
    <meta property="og:description" content="Professional architect in Bangladesh.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nafizfuad.qzz.io/">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nafiz Fuad">
    <meta name="twitter:description" content="Professional architect in Bangladesh.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/debee8b4-5daf-4d82-99a4-813e25e911d2">

    <link rel="icon" href="/favicon.ico" />

    <!-- 🔥 Loader (NO TEXT) -->
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      #loader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      /* simple spinner */
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #ddd;
        border-top: 3px solid #111;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* SEO content (visible to crawlers, behind loader) */
      #seo-content {
        padding: 40px;
      }
    </style>

    <!-- Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Nafiz Fuad",
      "jobTitle": "Architect",
      "url": "https://nafizfuad.qzz.io",
      "sameAs": [
        "https://linkedin.com/in/your-actual-profile",
        "https://instagram.com/your-actual-profile"
      ]
    }
    </script>

  </head>

  <body>

    <!-- ✅ NO TEXT LOADER -->
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <!-- ✅ REAL SEO CONTENT (NOT hidden, just behind loader) -->
    <div id="seo-content">
      <h1>Nafiz Fuad – Architect & Interior Designer in Bangladesh</h1>
      <p>
        Professional architectural services specializing in residential, commercial,
        and interior design in Bangladesh.
      </p>

      <nav>
        <a href="#projects">Projects</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>

    <!-- React -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Remove loader after load -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>

  </body>
</html>
